#Install emulationstation
---
- name: Install EmulationStation dependencies.
  apt:
    name: "{{ packages }}"
  vars:
    packages:
    - libfreeimage3
    - libboost-locale1.74.0 
    - libboost-filesystem1.74.0
    - libsdl2-2.0-0
    - libcurl4
    - libvlc5

- name: Download EmulationStation deb. 64 bit.
  get_url:
    url: "https://www.dropbox.com/s/r2e3p6ng09fuhbx/emulationstation_20221112-1_amd64.deb?dl=1"
    dest: "/root/emulationstation.deb"
  when: ansible_architecture == 'x86_64'

- name: Download EmulationStation deb. 32 bit.
  get_url:
    url: "https://www.dropbox.com/s/sx2dkhv2bcr2l1n/emulationstation_20221112-1_i386.deb?dl=1"
    dest: "/root/emulationstation.deb"
  when: ansible_architecture == 'i386'

- name: Install EmulationStation.
  apt:
    deb: "/root/emulationstation.deb"

- name: Remove deb file.
  file:
    path: "/root/emulationstation.deb"
    state: absent

