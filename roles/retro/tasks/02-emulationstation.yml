---
- name: Check if it's already installed.
  stat:
    path: "/usr/local/bin/emulationstation"
  register: emulationstation_bin

- name: Install attractplus build dependencies.
  apt:
    name: "{{ packages }}"
  vars:
    packages:
    - build-essential
    - cmake
    - libgl1-mesa-dev
    - libfreetype-dev
    - libfreeimage-dev
    - libsdl2-dev
    - libcurl4-openssl-dev
    - libvlc-dev
    - rapidjson-dev
  when: not emulationstation_bin.stat.exists

#https://stackoverflow.com/questions/50966777/ansible-download-latest-release-binary-from-github-repo
- name: Get latest release's tag.
  uri:
    url: https://api.github.com/repos/Retropie/EmulationStation/releases/latest
    return_content: true
  register: json_reponse
  when: not emulationstation_bin.stat.exists

- name: Download latest release from github.
  git:
    repo: 'https://github.com/RetroPie/EmulationStation'
    dest: /home/emulationstationgit
    version: "{{ json_reponse.json.tag_name  }}"
    recursive: true
  when: not emulationstation_bin.stat.exists

- name: Apply resources patch.
  patch:
    src: "{{ role_path }}/files/emulationstation_datasource.patch"
    basedir: "/home/emulationstationgit"
    strip: 1
  when: not emulationstation_bin.stat.exists

- name: Execute cmake.
  command: "cmake ."
    chdir: "/home/emulationstationgit"
  when: not emulationstation_bin.stat.exists

- name: Build emulationstation.
  make:
    chdir: "/home/emulationstationgit"
  when: not emulationstation_bin.stat.exists

- name: Install attractplus.
  make:
    chdir: /home/attractplus
    target: install
  when: not emulationstation_bin.stat.exists

- name: Create resources dir.
  file:
    path: "/usr/share/emulationstation"
    state: directory
  when: not emulationstation_bin.stat.exists

- name: Copy resources.
  copy:
    src: "/home/emulationstationgit/resources"
    dest: "/usr/share/emulationstation/resources"
  when: not emulationstation_bin.stat.exists
