---
- name: Check if it's already installed.
  stat:
    path: "/usr/local/bin/emulationstation"
  register: emulationstation_bin

- name: Install attractplus build dependencies.
  apt:
    name: "{{ packages }}"
  vars:
    packages:
    - build-essential
    - cmake
    - libgl1-mesa-dev
    - libfreetype-dev
    - libfreeimage-dev
    - libsdl2-dev
    - libcurl4-openssl-dev
    - libvlc-dev
    - rapidjson-dev
  when: not emulationstation_bin.stat.exists

#https://stackoverflow.com/questions/50966777/ansible-download-latest-release-binary-from-github-repo
- name: Get latest release's tag.
  uri:
    url: https://api.github.com/repos/Retropie/EmulationStation/releases/latest
    return_content: true
  register: json_reponse
#  when: not emulationstation_bin.stat.exists

- name: Download latest release from github.
  git:
    repo: 'https://github.com/RetroPie/EmulationStation'
    dest: /home/emulationstationgit
    version: "{{ json_reponse.json.tag_name  }}"
    recursive: true
  when: not emulationstation_bin.stat.exists

- name: Apply resources patch.
  patch:
    src: "{{ role_path }}/files/emulationstation_datasource.patch"
    basedir: "/home/emulationstationgit"
    strip: 1
  when: not emulationstation_bin.stat.exists

- name: Execute cmake.
  command:
    cmd: "cmake ."
    chdir: "/home/emulationstationgit"
  when: not emulationstation_bin.stat.exists

- name: Build emulationstation.
  make:
    chdir: "/home/emulationstationgit"
  when: not emulationstation_bin.stat.exists

- name: Install emulationstation.
  make:
    chdir: "/home/emulationstationgit"
    target: install
  when: not emulationstation_bin.stat.exists

- name: Create resources dir.
  file:
    path: "/usr/local/share/emulationstation"
    state: directory
  when: not emulationstation_bin.stat.exists

- name: Copy resources.
  copy:
    src: "/home/emulationstationgit/resources"
    dest: "/usr/local/share/emulationstation"
  when: not emulationstation_bin.stat.exists

- name: Remove build dependencies.
  apt:
    name: "{{ packages }}"
    state: absent
  vars:
    packages:
    - build-essential
    - cmake
    - libgl1-mesa-dev
    - libfreetype-dev
    - libfreeimage-dev
    - libsdl2-dev
    - libcurl4-openssl-dev
    - libvlc-dev
    - rapidjson-dev
  when: not emulationstation_bin.stat.exists

- name: Create package dirs.
  file:
    path: "/home/packages/emulationstation/{{ item }}"
    state: directory
  with_items:
     - usr/local/bin
     - usr/local/include
     - usr/local/lib/cmake/pugixml
     - usr/local/share/emulationstation
     - DEBIAN
  when: not emulationstation_bin.stat.exists

- name: Copy package files.
  copy:
    src: "/home/emulationstationgit/{{ item.src }}"
    dest: "/home/packages/emulationstation/{{ item.dest }}"
    mode: "{{ item.mode }}"
    remote_src: true
  with_items:
     - { mode: "0644", src: "libpugixml.a", dest: "usr/local/lib/libpugixml.a" }
     - { mode: "preserve", src: "resources", dest: "usr/local/share/emulationstation" }
     - { mode: "0644", src: "external/pugixml/src/pugixml.hpp", dest: "usr/local/include/pugixml.hpp" }
     - { mode: "0644", src: "external/pugixml/src/pugiconfig.hpp", dest: "usr/local/include/pugiconfig.hpp" }
     - { mode: "0644", src: "external/pugixml/CMakeFiles/Export/be764272e56105fc8ff11fec8314e604/pugixml-config.cmake", dest: "usr/local/lib/cmake/pugixml/pugixml-config.cmake" }
     - { mode: "0644", src: "external/pugixml/CMakeFiles/Export/be764272e56105fc8ff11fec8314e604/pugixml-config-noconfig.cmake", dest: "usr/local/lib/cmake/pugixml/pugixml-config-noconfig.cmake" }
     - { mode: "0755", src: "emulationstation", dest: "usr/local/bin/emulationstation" }
  when: not emulationstation_bin.stat.exists

- name: Copy package's control file.
  template:
    src: "{{ role_path }}/templates/control.j2"
    dest: "/home/packages/emulationstation/DEBIAN/control"
    mode: 0644
  vars:
    package_name: "emulationstation"
    package_description: "Emulator frontend"
    package_version: "{{ json_reponse.json.tag_name | replace('v','') }}" #remove the "v" character from the number
  when: not emulationstation_bin.stat.exists

- name: Build package.
  command:
    chdir: "/home/packages"
    argv:
      - /usr/bin/dpkg-deb
      - "--build"
      - "--root-owner-group"
      - emulationstation

- name: Remove source code.
  file:
    path: "/home/emulationstationgit"
    state: absent
  when: not emulationstation_bin.stat.exists
