#autologin
---
- name: Create /etc/systemd/system/getty@tty1.service.d directory.
  file:
    path: /etc/systemd/system/getty@tty1.service.d
    state: directory

- name: Create autologin service.
  blockinfile:
    path: /etc/systemd/system/getty@tty1.service.d/autologin.conf
    create: true
    block: |
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty -o '-p -f -- \\u' --noclear --autologin retro %I $TERM

- name: Remove ansible text.
  lineinfile:
    dest: /etc/xdg/Thunar/uca.xml
    state: absent
    regexp: "ANSIBLE"
